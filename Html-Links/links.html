<!DOCTYPE html>
<html>
    <head>
        Html-Links
    </head>
    <body>
        <!-- <a> tag defines a hyperlink-->
            <!--href is an attribute of <a> tag ,it shows the link's destination.-->
        <a href="lipsum.com">Visiting Lorem Ipsum site</a>
        <!--A full web address is absolute URL and local link i.e without "https://www" is relative URL-->

        <!--target attribute it sepcifies when to open the link-->
        <a href="lipsum.com" target="_blank">Visit the site</a>
        <!-- _self-Opens in the same window-->
        <!-- _blank-Opens in a new window-->
        <!-- _parent-Opens in parent frame-->
        <!-- _top-Opens in the full window-->

        <!--Image as link-->
        
        <a href="https://www.google.com">
            <img src="cats.jpeg" alt="Cats Image" style="width:200px;height:100px;">
        </a>

        <!--Email as link-->
        <a href="mailto:customer@example.com">Send mail</a>

        <!--Link titles-->
        <!--the text in title gets displayed when cursor hovers around the link-->
        <a href="lipsum.com" title="Lorem Ipsum">Vist the website.</a>
    </body>
</html>
