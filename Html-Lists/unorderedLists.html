<!DOCTYPE html>
<html>
    <head>Unordered List</head>
    <body>
        <ul>
            <li>Apple</li>
            <li>Banana</li>
            <li>Orange</li>
        </ul>
        <!--various list marker are available-->
        <!--disc,circle,square,none-->
        <ul style="list-style-type:circle;">
            <li>Apple</li>
            <li>Banana</li>
            <li>Orange</li>
        </ul>
        <!--lists can be nested-->
        <ul>
            <li>Tea</li>
            <li>Coffee
                <ul>
                    <li>Black Coffee</li>
                    <li>Cappuccino</li>
                </ul>
            </li>
            <li>Milk</li>
        </ul>
    </body>
</html>
