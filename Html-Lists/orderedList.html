<!DOCTYPE html>
<html>
    <body>
        <ol>
            <li>Apple</li>
            <li>Banana</li>
            <li>Orange</li>
        </ol>
        <!--List Marker-->
        <ol type="1">
            <li>Apple</li>
            <li>Banana</li>
            <li>Orange</li>
        </ol>
        <!--We can even use A,a,I,i-->
        <!--Control List counting-->
        <!--This is use when we want to start counting from a specified number instead of 1-->
        <ol start="20">
            <li>Apple</li>
            <li>Banana</li>
            <li>Orange</li>
        </ol>
        <!--Nested Lists-->
        <ol>
            <li>Milk</li>
            <li>Coffee
                <ol>
                    <li>Black Coffee</li>
                    <li>Cappuccino</li>
                </ol>
            </li>
            <li>Tea</li>
        </ol>
    </body>
</html>
