<!DOCTYPE html>
<html>
    <head>
        Html-Colors
    </head>
    <body>
        <!-- To give background color to text-->
        <h1 style="background-color:Pink;">Hello World</h1>

        <!--To give border to text-->
        <p style="border:2px solid Violet;">Welcome</p>

        <!--For text color-->
        <p style="color:MediumSeaGreen;">Html supports 140 standard color names</p>
        
    </body>
</html>
