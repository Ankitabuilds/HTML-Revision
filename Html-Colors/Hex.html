<!DOCTYPE html>
<html>
    <head>
        HEX colors & HSL colors 
    </head>
    <body>
        <!--HEX colors-->
        <h1 style="background-color:#0000ff;">#0000ff</h1>
        <!--Gray color-->
        <h1 style="background-color:#a0a0a0;">#a0a0a0</h1>

        <!------HSL colors------>
        <h1 style="background-color:hsl(147,50%,50%);">hsl(147,50%,50%)</h1>

        <!--Gray color-->
        <h1 style="background-color:hsl(0,0%,80%);">hsl(0,0%,80%)</h1>

        <!--hsla-->
        <h1 style="background-color:hsla(9,100%,64%,0.8);">hsla(9,100%,64%,0.8)</h1>
        

    </body>
</html>
