
<!--img tag has no closing tag as it does not hold any contents in it.-->
<!-- img tag has two most imp attributes src and alt-->
 <!--src defines the path of the image-->
 <!--alt gives alternate text if image is not visible due to some reason-->
 <img src="cats.jpeg" alt="Four Cats">

 <!--Width and height of images-->
 <img src="cats.jpeg" alt="Cats" width="200" height="100">

 <!--size of image can also be set using style attribute-->
 <img src="cats.jpeg" alt="Four Cats" style="width:200px;height:100px;">

 <!--Image as link-->        
    <a href="https://www.google.com">
        <img src="cats.jpeg" alt="Cats Image" style="width:200px;height:100px;">
    </a>

<!--Image Float-->
<p>Four little kittens.<img src="cats.jpeg" style="float:left;width:200px;height:100px;"></p>
 
<!--If images are in sub-folder then we need to specify the folder along with image name in src attribute of images-->

<!--If images are on another wesite then the URL must be specified along with image name in the src attribute of image tag-->
