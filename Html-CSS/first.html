<!DOCTYPE html>
<html>
    <!--Internal CSS-->
        <!--It styles a single HTML page it is written inside the head section within <style> element-->

    <head>
        <style>
            body {background-color:Blue;}
            h1 {color:brown;}
        </style>
    </head>
    <body>
        <h1>Hello World</h1>

        <!--Inline CSS-->
        <!--To use style attribute inside HTML element-->
        <p style="color:Violet">Welcome</p>
        <!--External CSS-->
        <!--We need to add link  in the head section-->
        <h2>Hello!!</h2>

    </body>
</html>
