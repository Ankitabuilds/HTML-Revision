<!DOCTYPE html>
<!--Class attribute is used to specify a class for an HTML element-->
<!--Multiple HTML elements can share the same class-->
<!--class attribute is used to point a class name in style sheet-->
<html>
    <head>
        <style>
            
            /*Class using div element*/
            .city {
                background-color:red;
                color:white;
                border:2px solid black;
                margin:20px;
            }

            /*Class using span element*/
            .name{
                background-color:violet;
                color:white;
                font-size:120%;
            }
            /*Classes can even be written inside heading tags*/
        </style>
    </head>
    <body>
        <div class="city">
            <h2>Paris</h2>
        </div>
        <h2>Myself <span class="name">Ankita</span></h2>
    </body>
</html>
