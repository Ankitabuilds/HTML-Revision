<!--id attribute is used to specify a unique id for an html element-->
<!--We can't have more than one element with same id-->
<!--it is written using '#'-->
<!DOCTYPE html>
<html>
    <head>
        <style>
            #first {
                background-color:beige;
                color:brown;
                text-align:center;
            }
        </style>
    </head>
    <body>
        <h1 id="first">Welcome</h1>
    </body>
</html>

<!--Class vs id-->
<!--Class name can be used by multiple html elements but id can only be used with one element-->
