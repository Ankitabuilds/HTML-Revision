<!DOCTYPE html>
<html>
    <style>
        <!--brorder-collapse is used if we want one single border in our table-->
        table,th,td {
            border:1px solid black;
            
            border-collapse:collapse;
        }
        th,td {
            background-color:Pink;
        }
    </style>
    <body>
        <table>
            <tr>
                <th>Name</th>
                <th>Gender</th>
                <th>Roll No.</th>
            </tr>
            <tr>
                <td>Tina</td>
                <td>Female</td>
                <td>1</td>
            </tr>
            <tr>
                <td>Raj</td>
                <td>Male</td>
                <td>2</td>
            </tr>
        </table>
        </table>
    </body>
</html>
<!--Borders can be coloured by writing
th,td {border-color:red;}    -->
<!--borders can have differrent styles dotted,dashed,solid,double,rigid etc.
by writing th,td {border-style:dotted;}-->
