<!DOCTYPE html>
<html>
    <!--writing width inside table tag using style sets the width of table-->
    <table style ="width:100%">
            <tr>
                <!--To set size of specific column the width is mentioned inside th tag-->
                <th style="width:60%">Name</th>
                <th>Gender</th>
                <th>Roll No.</th>
            </tr>
            <!--To set height of row we give height in tr-->
            <tr style="height:200px">
                <td>Tina</td>
                <td>Female</td>
                <td>1</td>
            </tr>
            <tr>
                <td>Raj</td>
                <td>Male</td>
                <td>2</td>
            </tr>
        </table>
        </table>
    </body>
</html>
