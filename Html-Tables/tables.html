<!DOCTYPE html>
<html>
    <head>Html-Tables</head>
    <!--Table border-->
    <style>
        /*Table with round border if we remove the 2nd line the it will become a double border table */
        table,th,td {
            border:1px solid black;
            border-radius : 10px;
        }
    </style>
    <body>
        <h2>Student Info</h2>
        <!--table tag is used to define table-->
        <table>
            <!--tr is used to represent table row-->
            <tr>
                <!--th tag is used for table headers-->
                <th>Name</th>
                <th>Gender</th>
                <th>Roll No.</th>
            </tr>
            <tr>
                <!--td tag is used to display table data-->
                <td>Tina</td>
                <td>Female</td>
                <td>1</td>
            </tr>
            <tr>
                <td>Raj</td>
                <td>Male</td>
                <td>2</td>
            </tr>
        </table>
        </table>
    </body>
</html>
